name: Publish Docker images to GHCR

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:
  # Weekly fresh rebuild so apk-package CVEs in the alpine bases are picked
  # up even during code-quiet weeks. Combined with `no-cache` below, this
  # guarantees `apk upgrade --no-cache` actually re-runs against the live
  # alpine repos instead of reusing a cached layer.
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  packages: write
  # Required for cosign keyless signing via the GitHub OIDC token.
  id-token: write
  # Required for the SARIF upload step (Trivy → Security tab).
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & push ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The `ollama` target is intentionally excluded — it adds only a thin
        # non-root patch on top of `ollama/ollama:latest` (mkdir + chown +
        # USER), so rebuilding multi-arch on every main push is wasteful.
        # Republish manually when upstream changes meaningfully:
        #   docker buildx build --platform linux/amd64,linux/arm64 \
        #     --target ollama \
        #     -t ghcr.io/vincentmakes/turbo-ea/ollama:latest \
        #     -t ghcr.io/vincentmakes/turbo-ea/ollama:0.70.0 \
        #     --push .
        image: [db, backend, frontend, nginx, mcp-server]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.image }}
          # `latest=auto` only retags `:latest` on push-to-default-branch and
          # semver-tag events — NOT on workflow_dispatch. That meant manual
          # rebuilds (e.g. the apk-upgrade republishes we run to pull fresh
          # Alpine OpenSSL fixes) silently published patched layers under
          # `:main` / `:sha-XXX` while `:latest` (which docker-compose and
          # the daily security scan both consume) kept pointing at the
          # previous unpatched merge. The fix below additionally tags
          # `:latest` on workflow_dispatch when run from main.
          flavor: latest=auto
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.event_name == 'schedule' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.image }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          # Bypass build cache on scheduled and manual runs so `apk upgrade`
          # actually re-runs against fresh alpine repos. Regular push builds
          # keep the cache for speed (~1m vs ~14m).
          no-cache: ${{ github.event_name != 'push' }}
          # ...but even on cached `push` builds, always rebuild the runtime
          # stages so `apk upgrade --no-cache` re-runs against the live alpine
          # repos. This matters most for RELEASES: a `v*.*.*` tag push is a
          # `push` event, so `no-cache` above is false and the build is cached —
          # yet a tag push is what publishes `:latest` (via `latest=auto`).
          # Without this filter a release could ship `:latest` with a stale
          # cached apk layer (the curl 8.19.0-r0 vs 8.20.0-r0 gap in July 2026).
          # The expensive build stages (frontend-build npm ci/build,
          # backend-build pip) are NOT listed, so they stay cached and builds
          # stay fast. NOTE: the input is `no-cache-filters` (plural) —
          # build-push-action silently ignores the singular form.
          no-cache-filters: backend,db,frontend,nginx,mcp-server
          provenance: true
          sbom: true

      # Sign the manifest list digest. Buildx returns a single digest covering
      # both linux/amd64 and linux/arm64, so one cosign call covers all
      # platforms transparently. Keyless OIDC signing — no cosign key to
      # rotate; verification uses the workflow identity certificate.
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image
        env:
          IMAGE: ghcr.io/${{ github.repository }}/${{ matrix.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      # Two-step Trivy strategy:
      #   1. Observe step (`severity: HIGH,CRITICAL`, `exit-code: 0`) — captures
      #      the full picture as SARIF for the Security tab; never fails CI.
      #   2. Gate step (`severity: CRITICAL`, `exit-code: 1`) — fails the
      #      publish on any CRITICAL not on the allowlist. Introduced after
      #      CVE-2026-42945 ("NGINX Rift") slipped through the non-blocking
      #      observe-only setup. HIGH stays observe-only until the backlog
      #      is drained.
      # Each runtime stage in the Dockerfile runs `apk upgrade --no-cache`
      # so apk-package CVEs in the pinned alpine bases are picked up
      # automatically; the build-stage-only and upstream-binary findings
      # that we can't fix from this repo are captured with rationale in
      # `.github/trivy-allowlist`.
      - name: Trivy image scan (observe, HIGH + CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}/${{ matrix.image }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"
          ignore-unfixed: true
          # Plain-text format (one CVE id per line + comments). Filename
          # has no `.yaml`/`.yml` extension on purpose — Trivy 0.65+ would
          # otherwise try to parse it as the YAML ignorefile schema and
          # fail on the bare CVE lines.
          trivyignores: .github/trivy-allowlist

      - name: Upload Trivy SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@53e96ec3b35fce51c141c0d6f0e31028a448722d # v3
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif
          category: trivy-${{ matrix.image }}

      - name: Trivy image scan (gate, CRITICAL only)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}/${{ matrix.image }}@${{ steps.build.outputs.digest }}
          format: table
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: .github/trivy-allowlist

      # Docker Scout — second-opinion scanner using Docker's own vuln DB.
      # Observe-only (`exit-code: false`) until we see how its findings overlap
      # with Trivy's; SARIF is uploaded to the Security tab under a separate
      # category so duplicate findings are clearly de-duped. Scout cannot run
      # anonymously — the action authenticates against Docker Hub to verify
      # the account is entitled to use Scout. The step is gated on the
      # `DOCKERHUB_PAT` secret being present so the workflow stays green if
      # credentials are ever removed; re-add the secret and Scout lights up
      # again on the next run.
      - name: Docker Scout CVE scan
        if: always() && env.DOCKERHUB_PAT != ''
        env:
          DOCKERHUB_PAT: ${{ secrets.DOCKERHUB_PAT }}
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ghcr.io/${{ github.repository }}/${{ matrix.image }}@${{ steps.build.outputs.digest }}
          only-severities: critical,high
          sarif-file: scout-${{ matrix.image }}.sarif
          exit-code: false
          summary: true
          dockerhub-user: ${{ secrets.DOCKERHUB_USER }}
          dockerhub-password: ${{ secrets.DOCKERHUB_PAT }}

      - name: Upload Docker Scout SARIF to Security tab
        if: always() && hashFiles(format('scout-{0}.sarif', matrix.image)) != ''
        uses: github/codeql-action/upload-sarif@53e96ec3b35fce51c141c0d6f0e31028a448722d # v3
        with:
          sarif_file: scout-${{ matrix.image }}.sarif
          category: scout-${{ matrix.image }}
