name: Publish GitHub Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build release notes from changelog
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          # Contract: CHANGELOG headings must stay in Keep a Changelog form,
          # e.g. `## [0.70.0] - 2026-05-05`, so the matching section can be cut.
          section=$(awk -v version="$version" '
            $0 ~ "^## \\[" version "\\]" { capture=1; next }
            capture && $0 ~ "^## \\[" { exit }
            capture { print }
          ' CHANGELOG.md)

          if [[ -z "$section" ]]; then
            echo "Could not find changelog section for version $version" >&2
            exit 1
          fi

          delimiter="CHANGELOG_$(openssl rand -hex 8)"
          {
            echo "name=Turbo EA $version"
            echo "body<<${delimiter}"
            printf '%s\n' "$section"
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        # TODO: pin to a SHA before merging — `@v2` follows a moving major.
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.notes.outputs.name }}
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: false
          generate_release_notes: false
