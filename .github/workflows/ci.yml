name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Change Detection ─────────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend || steps.filter.outputs.ci }}
      frontend: ${{ steps.filter.outputs.frontend || steps.filter.outputs.ci }}
      mcp: ${{ steps.filter.outputs.mcp || steps.filter.outputs.ci }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'scripts/dump_openapi.py'
            frontend:
              - 'frontend/**'
            mcp:
              - 'mcp-server/**'
            docs:
              - 'docs/**'
              - 'mkdocs.yml'
              - 'requirements-docs.txt'
            ci:
              - '.github/workflows/ci.yml'

  # ── Backend ───────────────────────────────────────────────────────────
  backend-lint:
    name: Backend Lint
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - run: pip install ruff>=0.8.0
      - run: ruff check backend/
      - run: ruff format --check backend/

  # Unit suite — pure logic, no Postgres. Fast (~2 min). Required for merge.
  # Catches typos, lint-equivalents, and most logic bugs before the slower
  # integration suite finishes.
  backend-test-unit:
    name: Backend Unit Tests
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: pip install -e ".[dev]"
        working-directory: backend
      - name: Run unit tests
        run: python -m pytest tests/core/ tests/services/ -q
        working-directory: backend

  # Integration suite — exercises the full HTTP stack against a real
  # Postgres. Slow (~15 min). Informational by default so PRs aren't
  # blocked on it; flip continue-on-error to false (or remove the line)
  # to make it required again.
  backend-test-integration:
    name: Backend Integration Tests
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: turboea
          POSTGRES_PASSWORD: turboea
          POSTGRES_DB: turboea_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U turboea -d turboea_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: pip install -e ".[dev]"
        working-directory: backend
      - name: Run all tests with coverage
        # Runs the full suite (unit + integration) so the 40% coverage gate
        # reflects total covered code, not just what tests/api/ exercises.
        # The unit subset is also run by the fast Backend Unit Tests job
        # for quick PR feedback — the duplication here costs ~30s out of
        # the integration job and keeps coverage meaningful.
        # `-n auto` enables pytest-xdist parallelism — conftest.py allocates
        # a per-worker Postgres schema (test_gw0, test_gw1, ...) so workers
        # don't collide on the savepoint-rollback fixture.
        run: python -m pytest -n auto --cov=app --cov-report=term-missing --cov-fail-under=40 -q
        working-directory: backend
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_USER: turboea
          POSTGRES_PASSWORD: turboea
          TEST_POSTGRES_DB: turboea_test

  backend-typecheck:
    name: Backend Type Check
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    # Informational only — does not block PRs until type errors are resolved
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: pip install -e ".[dev]"
        working-directory: backend
      - name: Run mypy
        run: python -m mypy app/
        working-directory: backend

  # ── Security Scanning ────────────────────────────────────────────────
  security-backend:
    name: Backend Security Scan
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    # Informational only — does not block PRs until findings are triaged
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install pip-audit and pip-tools
        run: pip install pip-audit pip-tools
      - name: Generate requirements and audit
        # PYSEC-2025-183 (PyJWT "weak encryption"): disputed upstream. The
        # advisory targets HMAC key length, which PyJWT cannot enforce — it
        # is the operator's responsibility. Turbo EA's `.env.example` tells
        # operators to generate SECRET_KEY via `python -c "import secrets;
        # print(secrets.token_urlsafe(64))"` (512 bits of entropy), and the
        # lifespan check in app/main.py rejects the default placeholder
        # keys in non-development environments.
        run: |
          pip-compile --quiet --strip-extras -o /tmp/requirements.txt backend/pyproject.toml
          pip-audit --strict --desc -r /tmp/requirements.txt \
            --ignore-vuln PYSEC-2025-183

  security-frontend:
    name: Frontend Security Scan
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    # Informational only — does not block PRs until findings are triaged
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - name: Audit npm dependencies
        run: npm audit --omit=dev
        working-directory: frontend

  # ── Migration Rollback Test ───────────────────────────────────────────
  migration-rollback:
    name: Migration Rollback Test
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: turboea
          POSTGRES_PASSWORD: turboea
          POSTGRES_DB: turboea_migration_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U turboea -d turboea_migration_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: pip install -e ".[dev]"
        working-directory: backend
      - name: Create tables and stamp head (mirrors app startup on fresh DB)
        run: |
          python -c "
          from app.models import Base
          from app.database import engine
          import asyncio

          async def init():
              async with engine.begin() as conn:
                  await conn.run_sync(Base.metadata.create_all)

          asyncio.run(init())
          "
          alembic stamp head
        working-directory: backend
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5433"
          POSTGRES_USER: turboea
          POSTGRES_PASSWORD: turboea
          POSTGRES_DB: turboea_migration_test
      - name: Test downgrade and re-upgrade of latest migration
        run: |
          alembic downgrade -1
          alembic upgrade head
        working-directory: backend
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5433"
          POSTGRES_USER: turboea
          POSTGRES_PASSWORD: turboea
          POSTGRES_DB: turboea_migration_test

  # ── Frontend ──────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend

  frontend-build:
    name: Frontend Build
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  frontend-test:
    name: Frontend Tests
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx vitest run --coverage.enabled --coverage.reporter=text
        working-directory: frontend

  # ── MCP Server ───────────────────────────────────────────────────────
  mcp-test:
    name: MCP Server Tests
    needs: changes
    if: needs.changes.outputs.mcp == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: mcp-server/pyproject.toml
      - run: pip install -e ".[dev]"
        working-directory: mcp-server
      - run: python -m pytest -q
        working-directory: mcp-server

  # ── OpenAPI Spec (auto-regenerated for the docs site) ────────────────
  # On PRs:  fails if docs/api/openapi.json has drifted from the backend.
  # On main: regenerates and commits the spec back to main when stale, so
  #          contributors can land backend changes without running the
  #          dump script locally.
  openapi-spec:
    name: OpenAPI Spec
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          # On fork PRs, the head branch lives in the contributor's fork rather
          # than the base repository, so checkout must follow the PR head repo.
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.ref }}
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend (no dev deps)
        run: pip install -e .
        working-directory: backend
      - name: Regenerate OpenAPI spec
        run: python scripts/dump_openapi.py docs/api/openapi.json
      - name: Check for drift
        id: diff
        run: |
          if git diff --quiet -- docs/api/openapi.json; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
            echo "OpenAPI spec is up to date."
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
            echo "::group::Spec drift"
            git --no-pager diff -- docs/api/openapi.json | head -200
            echo "::endgroup::"
          fi
      - name: Fail PR if spec is stale
        if: github.event_name == 'pull_request' && steps.diff.outputs.drift == 'true'
        run: |
          echo "::error::docs/api/openapi.json is out of sync with the backend."
          echo "Run 'python scripts/dump_openapi.py' locally and commit the result."
          exit 1
      - name: Commit refreshed spec on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.diff.outputs.drift == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/api/openapi.json
          git commit -m "chore(docs): regenerate OpenAPI spec [skip ci]"
          git push origin HEAD:main

  # ── Documentation ────────────────────────────────────────────────────
  docs-build:
    name: Docs Build
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - run: pip install -r requirements-docs.txt
      - run: mkdocs build
