name: turboea

services:
  db:
    image: ghcr.io/vincentmakes/turbo-ea/db:${TURBO_EA_TAG:-latest}
    restart: unless-stopped
    user: "${APP_UID:-1000}:${APP_GID:-1000}"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-turboea}
      POSTGRES_USER: ${POSTGRES_USER:-turboea}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/vincentmakes/turbo-ea/backend:${TURBO_EA_TAG:-latest}
    restart: unless-stopped
    user: "${APP_UID:-1000}:${APP_GID:-1000}"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: ${BACKEND_MEMORY_LIMIT:-2G}
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-turboea}
      POSTGRES_USER: ${POSTGRES_USER:-turboea}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in .env}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8920}
      RESET_DB: ${RESET_DB:-false}
      SEED_DEMO: ${SEED_DEMO:-false}
      SEED_BPM: ${SEED_BPM:-false}
      SEED_PPM: ${SEED_PPM:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@turboea.local}
      SMTP_TLS: ${SMTP_TLS:-true}
      AI_PROVIDER_URL: ${AI_PROVIDER_URL:-}
      AI_MODEL: ${AI_MODEL:-}
      AI_SEARCH_PROVIDER: ${AI_SEARCH_PROVIDER:-duckduckgo}
      AI_SEARCH_URL: ${AI_SEARCH_URL:-}
      AI_AUTO_CONFIGURE: ${AI_AUTO_CONFIGURE:-false}
      NVD_API_KEY: ${NVD_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    expose:
      - "8000"
    volumes:
      # Persistent app data: installed extensions plus workspace-transfer and
      # migration upload snapshots. Without this the data/ tree lives in the
      # container layer and is lost on every `docker compose pull` upgrade.
      - backend_data:/app/data

  frontend:
    image: ghcr.io/vincentmakes/turbo-ea/frontend:${TURBO_EA_TAG:-latest}
    restart: unless-stopped
    user: "${APP_UID:-1000}:${APP_GID:-1000}"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: ${FRONTEND_MEMORY_LIMIT:-256M}
    expose:
      - "8080"

  mcp-server:
    image: ghcr.io/vincentmakes/turbo-ea/mcp-server:${TURBO_EA_TAG:-latest}
    profiles:
      - mcp
    restart: unless-stopped
    user: "${APP_UID:-1000}:${APP_GID:-1000}"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: ${MCP_MEMORY_LIMIT:-256M}
    environment:
      TURBO_EA_URL: ${TURBO_EA_URL:-http://backend:8000}
      TURBO_EA_PUBLIC_URL: ${TURBO_EA_PUBLIC_URL:-http://localhost:8920}
      MCP_PORT: ${MCP_PORT:-8001}
      MCP_PUBLIC_URL: ${MCP_PUBLIC_URL:-http://localhost:8920/mcp}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    expose:
      - "8001"

  nginx:
    image: ghcr.io/vincentmakes/turbo-ea/nginx:${TURBO_EA_TAG:-latest}
    restart: unless-stopped
    user: "${APP_UID:-1000}:${APP_GID:-1000}"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      TURBO_EA_PUBLIC_URL: ${TURBO_EA_PUBLIC_URL:-http://localhost:8920}
      TURBO_EA_TLS_ENABLED: ${TURBO_EA_TLS_ENABLED:-false}
      NGINX_ENABLE_IPV6: ${NGINX_ENABLE_IPV6:-false}
      NGINX_RESOLVER: ${NGINX_RESOLVER:-}
      NGINX_TLS_HOST_PORT: ${TLS_HOST_PORT:-9443}
      TURBO_EA_TLS_CERT_FILE: ${TURBO_EA_TLS_CERT_FILE:-cert.pem}
      TURBO_EA_TLS_KEY_FILE: ${TURBO_EA_TLS_KEY_FILE:-key.pem}
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    volumes:
      - ${TLS_CERTS_DIR:-./certs}:/certs:ro
    ports:
      - "${HOST_PORT:-8920}:8080"
      - "${TLS_HOST_PORT:-9443}:8443"

  ollama:
    image: ghcr.io/vincentmakes/turbo-ea/ollama:${TURBO_EA_TAG:-latest}
    profiles:
      - ai
    restart: unless-stopped
    user: "${APP_UID:-1000}:${APP_GID:-1000}"
    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-5m}
    volumes:
      - ollama_models:/models
    expose:
      - "11434"
    deploy:
      resources:
        limits:
          memory: ${OLLAMA_MEMORY_LIMIT:-4G}
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
  ollama_models:
  backend_data:
