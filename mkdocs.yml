# ---------------------------------------------------------------------------
# Markdown extensions
# ---------------------------------------------------------------------------
markdown_extensions:
  - admonition                     # Note / Warning / Tip callout boxes
  - pymdownx.details               # Collapsible admonitions (??? note)
  - pymdownx.superfences            # Fenced code blocks, diagrams
  - pymdownx.tabbed:                # Content tabs
      alternate_style: true
  - attr_list                       # HTML attributes on elements
  - md_in_html                      # Markdown inside HTML blocks
  - tables                          # Pipe tables
  - toc:
      permalink: true               # Anchor links on headings

# ---------------------------------------------------------------------------
# Navigation
# ---------------------------------------------------------------------------
nav:
  - Home: index.md
  - Getting Started:
      - Accessing the Platform: getting-started/login.md
  - User Guide:
      - Dashboard: guide/dashboard.md
      - Inventory: guide/inventory.md
      - Card Details: guide/card-details.md
      - Reports: guide/reports.md
      - Saved Reports: guide/saved-reports.md
      - BPM: guide/bpm.md
      - Diagrams: guide/diagrams.md
      - EA Delivery: guide/delivery.md
      - Tasks & Surveys: guide/tasks.md
      - Notifications: guide/notifications.md
  - Administration:
      - admin/index.md
      - General Settings: admin/settings.md
      - Metamodel: admin/metamodel.md
      - Calculations: admin/calculations.md
      - Tags: admin/tags.md
      - Users & Roles: admin/users.md
      - Authentication & SSO: admin/sso.md
      - AI Capabilities: admin/ai.md
      - MCP Integration: admin/mcp.md
      - End-of-Life (EOL): admin/eol.md
      - Surveys: admin/surveys.md
      - Web Portals: admin/web-portals.md
      - ServiceNow Integration: admin/servicenow.md
  - Reference:
      - Glossary: reference/glossary.md

# ---------------------------------------------------------------------------
# Extra
# ---------------------------------------------------------------------------
extra:
  # Google Analytics
  analytics:
    provider: google
    property: G-SZM87KYZQJ
  consent:
    title: Cookie consent
    description: >-
      We use cookies to recognize your repeated visits and preferences,
      as well as to measure the effectiveness of our documentation.
      With your consent, you're helping us to make our documentation better.

  # Language selector in the header
  alternate:
    - name: English
      link: /
      lang: en
    - name: Español
      link: /es/
      lang: es
    - name: Deutsch
      link: /de/
      lang: de
    - name: Français
      link: /fr/
      lang: fr
    - name: Italiano
      link: /it/
      lang: it
    - name: Português
      link: /pt/
      lang: pt
    - name: 中文
      link: /zh/
      lang: zh

